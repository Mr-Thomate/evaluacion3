server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: MS1-service
              uri: http://127.0.0.1:8081
              predicates:
                - Path=/api/v1/clientes/**
                - Path=/api/v1/prestamos/**

            - id: MS2-service
              uri: http://127.0.0.1:8082
              predicates:
                - Path=/api/v1/empleados/**
                - Path=/api/v1/contratos/**

            - id: MS3-service
              uri: http://127.0.0.1:8083
              predicates:
                - Path=/api/v1/regiones/**
                - Path=/api/v1/comunas/**
                - Path=/api/v1/bibliotecas/**

            - id: MS4-service
              uri: http://127.0.0.1:8084
              predicates:
              - Path=/api/v1/libros/**
              - Path=/api/v1/categorias/**
              - Path=/api/v1/autores/**
              - Path=/api/v1/editoriales/**
