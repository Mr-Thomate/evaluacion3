server:
  port: 8081

spring:
  application:
    name: microservicio-prestamo
  
  datasource:
    url: jdbc:mysql://localhost:3306/biblioteca_prestamos?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /doc/swagger-ui/index.html